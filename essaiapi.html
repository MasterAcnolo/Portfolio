<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activité GitHub</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; text-align: center; }
        #activity { margin-top: 20px; }
        .event { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; }
        .heatmap { margin-top: 20px; }
        canvas { max-width: 600px; margin: auto; }
    </style>
</head>
<body>

    <h2>Activité GitHub de <span id="username">USERNAME</span></h2>
    
    <!-- Heatmap -->
    <h3>Heatmap des Contributions</h3>
    <div class="heatmap">
        <img id="heatmap-img" src="" alt="GitHub Heatmap">
    </div>

    <!-- Graphique des commits -->
    <h3>Graphique des Commits</h3>
    <canvas id="commitChart"></canvas>

    <!-- Activité récente -->
    <h3>Dernière Activité</h3>
    <div id="activity">Chargement...</div>

    <script>
        const username = "MasterAcnolo"; // Remplace par ton pseudo GitHub
        const repoName = "Stressful-Desktop"; // Remplace par ton repo (ex: "mon-projet")

        // 🔥 1️⃣ Récupérer les événements récents
        async function fetchGitHubActivity() {
            const response = await fetch(`https://api.github.com/users/${username}/events`);
            const events = await response.json();
            const activityDiv = document.getElementById("activity");
            activityDiv.innerHTML = ""; 

            events.slice(0, 5).forEach(event => {
                const div = document.createElement("div");
                div.className = "event";
                div.innerHTML = `<strong>${event.type}</strong> dans <a href="${event.repo.url.replace('api.', '').replace('/repos', '')}" target="_blank">${event.repo.name}</a>`;
                activityDiv.appendChild(div);
            });
        }

        // 🟩 2️⃣ Ajouter le Heatmap SVG officiel de GitHub
        function loadHeatmap() {
            const heatmapImg = document.getElementById("heatmap-img");
            heatmapImg.src = `https://github-readme-activity-graph.vercel.app/graph?username=${username}&theme=high-contrast`;
        }

        // 📊 3️⃣ Récupérer les commits et générer un graphique
        async function fetchCommitStats() {
            const response = await fetch(`https://api.github.com/repos/${username}/${repoName}/stats/commit_activity`);
            const data = await response.json();
            
            const weeks = data.map(item => new Date(item.week * 1000).toLocaleDateString());
            const commits = data.map(item => item.total);

            // Générer le graphique
            const ctx = document.getElementById('commitChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: weeks,
                    datasets: [{
                        label: 'Commits par semaine',
                        data: commits,
                        borderColor: 'blue',
                        borderWidth: 2,
                        fill: false
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        x: { title: { display: true, text: "Semaine" } },
                        y: { title: { display: true, text: "Nombre de commits" } }
                    }
                }
            });
        }   

        fetchGitHubActivity();
        loadHeatmap();
        fetchCommitStats();
    </script>

</body>
</html>
